version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"

  backend:
    build: .
    container_name: nest-backend
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017/posts-comments-db
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev